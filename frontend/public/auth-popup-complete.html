<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Authentication Complete</title>
  </head>
  <body>
    <noscript>このページは JavaScript が必要です。</noscript>
    <script>
      (function () {
        var targetOrigin = window.name || "";

        if (!window.opener || !targetOrigin) {
          window.close();
          return;
        }

        try {
          window.opener.postMessage(
            {
              type: "sample-edge-auth:cloudfront-auth-complete",
              cloudFrontOrigin: window.location.origin,
            },
            targetOrigin,
          );
        } catch (e) {
          // ignore
        }

        window.close();
      })();
    </script>
  </body>
</html>
